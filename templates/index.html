<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Stock - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="login-bg d-flex align-items-center justify-content-center min-vh-100">

  <div class="login-card card shadow-lg p-4" style="width:100%;max-width:420px;">
    <div class="text-center mb-4">
      <div class="brand-icon mb-2">
        <i class="bi bi-box-seam-fill fs-1 text-primary"></i>
      </div>
      <h3 class="fw-bold text-primary mb-0">Smart Stock</h3>
      <p class="text-muted small">Sistem Manajemen Persediaan Barang</p>
    </div>

    <div id="alert-login" class="alert alert-danger d-none" role="alert"></div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" id="username" class="form-control" placeholder="Masukkan username"/>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input type="password" id="password" class="form-control" placeholder="Masukkan password"/>
        <button class="btn btn-outline-secondary" type="button" id="togglePass">
          <i class="bi bi-eye" id="eyeIcon"></i>
        </button>
      </div>
    </div>

    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input" id="rememberMe"/>
      <label class="form-check-label text-muted small" for="rememberMe">Ingat saya</label>
    </div>

    <button class="btn btn-primary w-100 fw-semibold py-2" id="btnLogin">
      <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
